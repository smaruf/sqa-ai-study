[pytest]
# Collect any Python file — example files follow a <NN>_<topic>.py convention
python_files = *.py
python_classes = Test*
python_functions = test_*
# Run from the python/ subdirectory so llm_client is importable
testpaths = python
markers =
    integration: tests that require a live Ollama instance (deselect with -m "not integration")
