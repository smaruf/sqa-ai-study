[pytest]
# Collect any Python file — the level files follow a <NN>_<topic>.py convention
# rather than the default test_*.py pattern.
python_files = *.py
python_classes = Test*
python_functions = test_*
# Add the python/ subdirectories to sys.path so fixtures are found
testpaths =
    level-0-beginner/python
    level-1-basic/python
    level-2-intermediate/python
    level-3-advanced/python
    level-4-expert/python
    level-5-master/python
